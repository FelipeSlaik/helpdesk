<h1>Chamados</h1>

<a href="/chamados/novo">
    <button>Novo chamado</button>
</a>

{% for chamado in chamados %}

<h3>{{ chamado.titulo }}</h3>

<p>{{ chamado.descricao }}</p>

<p>Prioridade: {{ chamado.prioridade }}</p>

<a href="/chamados/excluir/{{ chamado.id }}">
        <button>Excluir</button>
</a>
<hr>

{% endfor %}
